# DeepEval gate runs on a weekly schedule and on manual trigger only.
# It is NOT triggered on every PR because:
#   1. LLM-judge metrics (faithfulness, answer_relevancy) call a model per question
#   2. Even a local Ollama judge adds 5-15 minutes on 100+ golden questions
#   3. A weekly cadence catches regressions without choking PR throughput
# Set STRATUM_EVAL_WARN_ONLY=false (after baselines are established) to make
# threshold failures block the workflow.

name: DeepEval Evaluation

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 6 * * 1"  # every Monday at 06:00 UTC

jobs:
  deepeval:
    name: DeepEval Gate
    runs-on: ubuntu-latest

    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
        # No --health-cmd: Ollama image does not have curl/wget.
        # Readiness is checked from the runner in the "Wait for Ollama" step.

      weaviate:
        image: cr.weaviate.io/semitechnologies/weaviate:1.27.0
        ports:
          - "8080:8080"
          - "50051:50051"
        env:
          QUERY_DEFAULTS_LIMIT: "25"
          AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
          PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
          DEFAULT_VECTORIZER_MODULE: "none"
          ENABLE_MODULES: ""
          CLUSTER_HOSTNAME: "node1"
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:8080/v1/.well-known/ready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Wait for Ollama to be ready
        run: |
          for i in $(seq 1 24); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready"; exit 0
            fi
            echo "Attempt $i/24 — waiting 5s..."; sleep 5
          done
          echo "Ollama did not start within 2 minutes" >&2; exit 1

      - name: Pull Ollama judge model
        # The Ollama CLI is not installed on the runner — pull via the container's HTTP API
        run: |
          curl -s -X POST http://localhost:11434/api/pull \
            -H "Content-Type: application/json" \
            -d '{"name": "llama3.1:8b"}' | tail -1

      - name: Download eval documents
        # PDFs are gitignored — download the golden source document for CI eval
        run: |
          mkdir -p data/golden/docs
          curl -sL "https://arxiv.org/pdf/1706.03762" \
            -o data/golden/docs/attention_is_all_you_need.pdf

      - name: Ingest golden documents
        run: stratum-ingest --source data/golden/docs/ --env ci
        env:
          STRATUM_STORE_BACKEND: weaviate
          STRATUM_EMBED_BACKEND: openai
          STRATUM_ANTHROPIC_API_KEY: ${{ secrets.STRATUM_ANTHROPIC_API_KEY }}
          STRATUM_OPENAI_API_KEY: ${{ secrets.STRATUM_OPENAI_API_KEY }}

      - name: Run DeepEval gate
        run: pytest tests/e2e/test_eval.py -v --tb=short --no-cov
        env:
          STRATUM_STORE_BACKEND: weaviate
          STRATUM_EMBED_BACKEND: openai
          STRATUM_ANTHROPIC_API_KEY: ${{ secrets.STRATUM_ANTHROPIC_API_KEY }}
          STRATUM_OPENAI_API_KEY: ${{ secrets.STRATUM_OPENAI_API_KEY }}
          STRATUM_EVAL_WARN_ONLY: "true"
          STRATUM_EVAL_JUDGE_BACKEND: ollama
          STRATUM_EVAL_JUDGE_MODEL: llama3.1:8b

      - name: Upload DeepEval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepeval-report
          path: reports/deepeval_report.json
          retention-days: 30

      - name: Write scores to job summary
        if: always()
        run: |
          python -c "
          import json, pathlib, sys
          p = pathlib.Path('reports/deepeval_report.json')
          if not p.exists():
              print('No report found.')
              sys.exit(0)
          r = json.loads(p.read_text())
          print('## DeepEval Scores')
          print('| Metric | Score | Threshold |')
          print('|--------|-------|-----------|')
          thresholds = {'faithfulness': 0.85, 'answer_relevancy': 0.80, 'contextual_precision': 0.75, 'contextual_recall': 0.70}
          for k, v in r.get('scores', {}).items():
              t = thresholds.get(k, '-')
              status = '✅' if isinstance(t, float) and v >= t else '⚠️'
              print(f'| {k} | {v:.3f} | {t} {status} |')
          print()
          print(f'**Passed:** {r.get(\"passed\", False)}')
          print(f'**Judge:** {r.get(\"judge_backend\", \"\")} / {r.get(\"judge_model\", \"\")}')
          " >> $GITHUB_STEP_SUMMARY
